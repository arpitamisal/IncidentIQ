apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: acme-api-ingress
  namespace: production
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts:
        - api.acme-shop.com
      secretName: api-acme-shop-tls
  rules:
    - host: api.acme-shop.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 80
